name: Engineering blog digest

on:
  schedule:
    # Primary: 13:37 UTC = 19:07 IST — evening reading slot, away from the
    # 6–7 AM briefings. Odd minute avoids top-of-hour cron congestion.
    - cron: '37 13 * * *'
    # Backup: 14:37 UTC = 20:07 IST. GitHub delays or drops schedule events
    # under load (fleet lesson from 2026-07-04). The guard step skips this
    # run when the primary already handled today, so it only delivers when
    # the primary was dropped — or failed, making it a retry too.
    - cron: '37 14 * * *'
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: 'Hours of posts to cover (catch-up runs)'
        default: '24'
        required: false

permissions:
  contents: read
  actions: read  # guard step lists today's runs

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Skip if an earlier run already handled today
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Manual runs always proceed; only scheduled runs dedupe against
          # each other. Fails open — a broken check must never cost a digest.
          if [ "$GITHUB_EVENT_NAME" != "schedule" ]; then
            exit 0
          fi
          today=$(date -u +%Y-%m-%d)
          count=$(RUN_ID="$GITHUB_RUN_ID" gh api -X GET \
            "repos/$GITHUB_REPOSITORY/actions/workflows/eng-blogs.yml/runs" \
            -f event=schedule -f created=">=$today" \
            --jq '[.workflow_runs[]
                   | select(.id != (env.RUN_ID|tonumber))
                   | select(.status == "queued" or .status == "in_progress"
                            or .conclusion == "success")] | length') || count=0
          case "$count" in ''|*[!0-9]*) count=0;; esac
          if [ "$count" -gt 0 ]; then
            echo "An earlier scheduled run already handled today — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.skip != 'true'

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.skip != 'true'
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: pip install -r requirements.txt

      - name: Run digest
        if: steps.guard.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ENG_BLOGS_LOOKBACK_HOURS: ${{ inputs.lookback_hours || '24' }}
        run: python eng_blogs.py
